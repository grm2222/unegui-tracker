name: Daily crawl

on:
  schedule:
    - cron: "0 22 * * *" # 06:00 Asia/Ulaanbaatar (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 175
    env:
      PYTHONUNBUFFERED: "1" # progress must reach the Actions log live
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Crawl
        # first full crawl (~2,000 detail pages at 1.2 s) can exceed 90 min;
        # step timeout < job timeout so the commit steps below still run
        timeout-minutes: 150
        run: python scraper.py

      - name: Rebuild dashboard
        if: always()
        run: python dashboard.py

      - name: Commit data + dashboard
        # commit even after a crawl timeout -- the scraper commits to SQLite
        # progressively, so partial progress is real data worth keeping
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/unegui.db docs/index.html
          git diff --cached --quiet || git commit -m "crawl $(TZ=Asia/Ulaanbaatar date +%F)"
          git push
